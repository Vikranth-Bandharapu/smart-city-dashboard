<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    background: white;
    color: #0b3d91;
    text-align: center;
}

h1 {
    font-size: 80px;
}

a {
    color: yellow;
    text-decoration: none;
}
.back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #0b3d91, #1e88e5);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 500;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* HOVER EFFECT */
.back-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* CLICK EFFECT */
.back-btn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<div>
    <h1>404</h1>
    <p>Page Not Found</p>
    <a href="index.html" class="back-btn">
    ← Back to Home
</a>
</div>

</body>
</html>
